<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <title>Sumin Kim SK baseball mark</title>
  <desc>Transparent SK monogram with baseball seam stitching, tightly fitted for stronger favicon presence.</desc>
  <defs>
    <linearGradient id="ink-s" x1="54" y1="92" x2="455" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#161A3D"/>
      <stop offset="0.58" stop-color="#0A1021"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="ink-k" x1="218" y1="103" x2="454" y2="419" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12213D"/>
      <stop offset="0.55" stop-color="#0A1021"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="seam" x1="84" y1="88" x2="434" y2="431" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF4D5A"/>
      <stop offset="1" stop-color="#D82032"/>
    </linearGradient>
  </defs>

  <g id="favicon-tight-fit" transform="translate(256 256) scale(1.10) translate(-256 -256)">

  <!-- Iconic baseball seams, without a ball outline, so the mark stays transparent and compact. -->
